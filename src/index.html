<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="head.title">Efrem's Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <nav class="rail" aria-label="Primary" data-i18n-aria-label="nav.primary">
  <div class="rail-main">
  <button type="button" data-target="about" aria-current="page" aria-label="About panel" title="About" data-i18n-aria-label="nav.about.aria" data-i18n-title="nav.about.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M12 12a3.5 3.5 0 1 0-3.5-3.5A3.5 3.5 0 0 0 12 12Zm-6 8a6 6 0 0 1 12 0"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  <button type="button" data-target="projects" aria-label="Projects panel" title="Projects" data-i18n-aria-label="nav.projects.aria" data-i18n-title="nav.projects.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M4 6h7v12H4zM13 6h7v7h-7zM13 15h7v3h-7z"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  <button type="button" data-target="experience" aria-label="Work experience panel" title="Work experience" data-i18n-aria-label="nav.experience.aria" data-i18n-title="nav.experience.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M7 7h10a2 2 0 0 1 2 2v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V9a2 2 0 0 1 2-2Zm3-2h4"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  <button type="button" data-target="journey" aria-label="Journey panel" title="Journey" data-i18n-aria-label="nav.journey.aria" data-i18n-title="nav.journey.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M5 6h14M5 10h14M5 14h10"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <circle cx="8" cy="18" r="1.5" fill="currentColor" />
      <circle cx="12" cy="18" r="1.5" fill="currentColor" />
      <circle cx="16" cy="18" r="1.5" fill="currentColor" />
    </svg>
  </button>
  <button type="button" data-target="education" aria-label="Education and skills panel" title="Education & skills" data-i18n-aria-label="nav.education.aria" data-i18n-title="nav.education.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M3 7l9-4 9 4-9 4-9-4Zm0 0v6l9 4 9-4V7"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  <button type="button" data-target="contact" aria-label="Contact panel" title="Contact" data-i18n-aria-label="nav.contact.aria" data-i18n-title="nav.contact.title">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M4 6h16v12H4z"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        d="M4 7.5 12 13l8-5.5"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  </div>
  <div class="rail-controls">
  <button type="button" class="lang-toggle" id="lang-toggle" aria-label="Switch language" data-i18n-aria-label="lang.toggleLabel" title="Switch language" data-i18n-title="lang.toggleLabel">
    EN
  </button>
  <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch theme" title="Switch theme">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M13.5 2.25a.75.75 0 0 1 .694 1.035A8.25 8.25 0 1 0 20.715 9.81a.75.75 0 0 1 1.035.694v.243A9.75 9.75 0 1 1 13.257 2.25h.243Z"/>
    </svg>
  </button>
  </div>
</nav>

      <section class="profile" aria-label="Profile" data-i18n-aria-label="profile.aria">
  <div class="profile-media">
    <img src="assets/profile-photo.png" alt="Efrem Ghebre profile photo">
  </div>
  <div class="profile-footer">
    <h1>Efrem Ghebre</h1>
    <p class="role" data-i18n="profile.role">Full-Stack Developer</p>
    <div class="profile-actions">
      <div class="socials" aria-label="Social links" data-i18n-aria-label="profile.socials">
        <a href="https://www.linkedin.com/in/efrem-ghebre/" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M6.5 9H4v11h2.5V9Zm-1.25-4A1.45 1.45 0 1 0 5.25 8a1.45 1.45 0 0 0 0-2.9ZM20 14.2c0-3.2-1.7-4.7-4-4.7a3.5 3.5 0 0 0-3.2 1.7V9H10v11h2.5v-6.1c0-1.6.6-2.6 2-2.6s1.8 1.1 1.8 2.6V20H20Z"
              fill="currentColor"
            />
          </svg>
        </a>
        <a href="https://github.com/efremghebre" aria-label="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.2-3.4-1.2-.4-1-.9-1.2-.9-1.2-.8-.5.1-.5.1-.5 1 .1 1.5 1 1.5 1 .8 1.5 2.2 1.1 2.7.8.1-.6.3-1.1.6-1.3-2.2-.2-4.6-1.1-4.6-4.9 0-1.1.4-2.1 1-2.8-.1-.2-.4-1.2.1-2.5 0 0 .9-.3 2.9 1a10 10 0 0 1 5.2 0c2-1.3 2.9-1 2.9-1 .5 1.3.2 2.3.1 2.5.6.7 1 1.6 1 2.8 0 3.8-2.4 4.7-4.6 4.9.3.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0 0 12 2Z"
              fill="currentColor"
            />
          </svg>
        </a>
      </div>
      <a class="socials-button" href="resume/cv.en.html" target="_blank" data-i18n="profile.resume" data-i18n-href="profile.resumeHref">Download CV ↓</a>
    </div>
  </div>
</section>

      <section class="panel-shell" aria-live="polite">
        <article class="panel active" id="about" data-index="0">
          {% include "partials/about.njk" %}
        </article>

        <article class="panel" id="projects" data-index="1">
          {% include "partials/projects.njk" %}
        </article>

        <article class="panel" id="experience" data-index="2">
          {% include "partials/experience.njk" %}
        </article>

        <article class="panel" id="journey" data-index="3">
          {% include "partials/journey.njk" %}
        </article>

        <article class="panel" id="education" data-index="4">
          {% include "partials/education-skills.njk" %}
        </article>

        <article class="panel" id="contact" data-index="5">
          {% include "partials/contact.njk" %}
        </article>

      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
